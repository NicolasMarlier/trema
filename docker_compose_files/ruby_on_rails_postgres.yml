services:
  web:
    build: .
    ports:
      - "${WEB_PORT:-0}:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgres://$POSTGRES_USER:$POSTGRES_PASSWORD@db:5432/$POSTGRES_DB
    env_file:
      - .env
    depends_on:
      - db
  db:
    image: postgres:18
    expose:
      - "5432"
    environment:
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_DB: $POSTGRES_DB
    volumes:
      - db_data:/var/lib/postgresql
      - /db_dumps:/db_dumps

volumes:
  db_data: